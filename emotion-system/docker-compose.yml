services:
  api-service:
    build:
      context: ./backend
    container_name: emotion-api-service
    ports:
      - "8080:8080"
    environment:
      AI_SERVICE_BASE_URL: http://ai-service:5000
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=emotiondb;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    depends_on:
      - ai-service
      - sqlserver

  ai-service:
    build:
      context: ./ai-service
    container_name: emotion-ai-service
    ports:
      - "5000:5000"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: emotion-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    volumes:
      - sqlserver-data:/var/opt/mssql

  sql-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: emotion-sql-init
    depends_on:
      - sqlserver
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    volumes:
      - ./infra/sql/schema.sql:/schema.sql:ro
    entrypoint: /bin/bash
    command:
      - -c
      - >
        for i in {1..30}; do
          /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" && break;
          sleep 2;
        done &&
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_SA_PASSWORD}" -i /schema.sql
    restart: "no"

volumes:
  sqlserver-data:
